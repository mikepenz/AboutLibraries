name: Record Screenshots

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to record screenshots for'
        required: false
        default: ''

jobs:
  record:
    name: Record Paparazzi Screenshots
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: 'zulu'
          java-version: |
            17
            21

      - name: Copy CI gradle.properties
        run: mkdir -p ~/.gradle ; cp .github/ci-gradle.properties ~/.gradle/gradle.properties

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6

      - name: Publish plugin locally
        run: |
          cd plugin-build
          ./gradlew publishToMavenLocal --no-configuration-cache

      - name: Record Paparazzi Screenshots
        run: ./gradlew :sample:android:recordPaparazziDebug

      - name: Commit updated screenshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sample/android/src/test/snapshots/
          git diff --cached --quiet || git commit -m "chore(screenshots): update Paparazzi golden images"
          git push
